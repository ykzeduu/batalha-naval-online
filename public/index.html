<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Naval - Arena Ilha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="floresta canto-superior-esquerdo">🌲 🌳 🌲<br>🌳 &nbsp; 🌲<br>🌲 🌳</div>
    <div class="floresta canto-superior-direito">🌳 🌲 🌳<br>🌲 &nbsp; 🌳<br>🌳 🌲</div>
    <div class="floresta canto-inferior-esquerdo">🌲 &nbsp; 🌳<br>🌳 🌲 🌲<br>🌲 &nbsp; 🌳</div>
    <div class="floresta canto-inferior-direito">🌳 🌲 &nbsp;<br>🌲 🌳 🌳<br>&nbsp; 🌲 🌳</div>

    <div class="container-tela">
        <div class="card">
            <h1>Monte sua Frota (8x8)</h1>
            <p style="margin-bottom: 15px; font-size: 14px; color: #94a3b8;">
                Obrigatório: Monte 1 navio de 3 blocos juntos e 2 navios de 2 blocos juntos.
            </p>
            
            <div class="setup-container">
                <div id="meu-grid-setup" class="grid-8x8"></div>
                
                <div class="controles-setup">
                    <div style="font-weight: bold; margin-bottom: 5px;">
                        Marcados: <span id="contador-blocos">0</span> / 7
                    </div>
                    <button onclick="limparSetup()" style="background: #10b981; border-color: #059669;">Limpar</button>
                    <button id="btn-confirmar-frota" onclick="confirmarFrota()" disabled style="background: #3b82f6; border-color: #2563eb;">Pronto</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Matriz de controle do tabuleiro (8x8)
        let meuTabuleiroSetup = Array(8).fill(0).map(() => Array(8).fill(0));
        let blocosMarcados = 0;

        function gerarGridSetup() {
            const container = document.getElementById('meu-grid-setup');
            if (!container) return;
            
            container.innerHTML = '';
            // Força o comportamento de Grid nativo antes de injetar os filhos
            container.style.display = 'grid'; 

            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    let cel = document.createElement('div'); 
                    cel.className = 'celula';
                    cel.id = `setup-${r}-${c}`;
                    
                    // Guardamos os atributos para o CSS usar caso seja necessário
                    cel.setAttribute('data-row', r);
                    cel.setAttribute('data-col', c);

                    cel.onclick = () => {
                        alternarBloco(r, c, cel);
                        atualizarPecasVerticais();
                    };
                    container.appendChild(cel);
                }
            }
        }

        function alternarBloco(r, c, cel) {
            if (meuTabuleiroSetup[r][c] === 0) {
                if (blocosMarcados < 7) {
                    meuTabuleiroSetup[r][c] = 1;
                    cel.classList.add('meu-navio');
                    blocosMarcados++;
                }
            } else {
                meuTabuleiroSetup[r][c] = 0;
                cel.classList.remove('meu-navio');
                cel.removeAttribute('data-v-peca');
                blocosMarcados--;
            }

            document.getElementById('contador-blocos').innerText = blocosMarcados;
            document.getElementById('btn-confirmar-frota').disabled = (blocosMarcados !== 7);
        }

        // Lógica inteligente que varre o tabuleiro mapeando quem é proa, meio e popa vertical
        function atualizarPecasVerticais() {
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    let cel = document.getElementById(`setup-${r}-${c}`);
                    if(cel) cel.removeAttribute('data-v-peca');
                }
            }

            for(let c=0; c<8; c++) {
                for(let r=0; r<8; r++) {
                    if (meuTabuleiroSetup[r][c] === 1) {
                        let temCima = (r > 0 && meuTabuleiroSetup[r-1][c] === 1);
                        let temBaixo = (r < 7 && meuTabuleiroSetup[r+1][c] === 1);
                        let temEsq = (c > 0 && meuTabuleiroSetup[r][c-1] === 1);
                        let temDir = (c < 7 && meuTabuleiroSetup[r][c+1] === 1);

                        // Se tem vizinho vertical e nenhum horizontal, trata como barco vertical
                        if ((temCima || temBaixo) && !temEsq && !temDir) {
                            let cel = document.getElementById(`setup-${r}-${c}`);
                            if (cel) {
                                if (!temCima && temBaixo) cel.setAttribute('data-v-peca', 'proa');
                                else if (temCima && temBaixo) cel.setAttribute('data-v-peca', 'meio');
                                else if (temCima && !temBaixo) cel.setAttribute('data-v-peca', 'popa');
                            }
                        }
                    }
                }
            }
        }

        function limparSetup() {
            meuTabuleiroSetup = Array(8).fill(0).map(() => Array(8).fill(0));
            blocosMarcados = 0; 
            document.getElementById('contador-blocos').innerText = 0;
            document.getElementById('btn-confirmar-frota').disabled = true; 
            gerarGridSetup();
        }

        function confirmarFrota() {
            alert("Frota pronta! Enviando dados de posicionamento...");
        }

        // Evento nativo do navegador para construir o Grid no exato momento do carregamento
        window.addEventListener('DOMContentLoaded', () => {
            gerarGridSetup();
        });
    </script>
</body>
</html>
